name: SecretVet Git History Scan

on:
  workflow_dispatch:
    inputs:
      since:
        description: 'Scan commits since (e.g. 2025-01-01)'
        required: false
        default: ''
      max_commits:
        description: 'Max commits to scan'
        required: false
        default: '500'
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3am UTC

permissions:
  contents: read

jobs:
  history-scan:
    name: Scan Git History for Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b  # v2
        with:
          egress-policy: audit
      - name: Checkout full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'

      - name: Install SecretVet
        run: npm install -g @secretvet/cli

      - name: Run git history scan
        run: |
          SINCE_ARG=""
          MAX_ARG="--max-commits ${{ inputs.max_commits || '500' }}"
          if [ -n "${{ inputs.since }}" ]; then
            SINCE_ARG="--since ${{ inputs.since }}"
          fi

          secretvet scan . --git-history $SINCE_ARG $MAX_ARG --format json \
            > secretvet-history.json || true

          cat secretvet-history.json | node -e "
            const r = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log('Commits scanned:', r.commitsScanned);
            console.log('Total findings:', r.summary.total);
            console.log('Critical:', r.summary.critical);
            console.log('High:', r.summary.high);
          " 2>/dev/null || true

      - name: Upload history scan results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: secretvet-history-${{ github.run_id }}
          path: secretvet-history.json
          retention-days: 30
