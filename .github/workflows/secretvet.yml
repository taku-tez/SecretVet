name: SecretVet Secret Scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  secretvet:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required for SARIF upload

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for --git-history mode

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SecretVet
        run: npm install -g @secretvet/cli

      # --- Current state scan (SARIF for GitHub Advanced Security) ---
      - name: Run SecretVet (SARIF)
        run: |
          secretvet scan . \
            --format sarif \
            --min-severity medium \
            > secretvet-results.sarif
        continue-on-error: true  # Don't fail here — let the SARIF upload handle it

      - name: Upload SARIF to GitHub Advanced Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: secretvet-results.sarif
          category: secretvet

      # --- Fail the build on critical/high findings ---
      - name: Check for critical/high secrets
        run: |
          secretvet scan . --min-severity high --format text
