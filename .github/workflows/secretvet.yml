name: SecretVet Secret Scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  secretvet:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'

      - name: Install SecretVet
        run: npm install -g @secretvet/cli

      - name: Run SecretVet (SARIF)
        run: |
          secretvet scan . \
            --format sarif \
            --min-severity medium \
            > secretvet-results.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Advanced Security
        uses: github/codeql-action/upload-sarif@ae9ef3a1d2e3413523c3741725c30064970cc0d4  # v3
        if: always()
        with:
          sarif_file: secretvet-results.sarif
          category: secretvet

      - name: Check for critical/high secrets
        run: |
          secretvet scan . --min-severity high --format text
